shell /usr/bin/fish
editor /usr/bin/nvim

font_family Iosevka Term Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0
font_hinting none

initial_window_width 120c
initial_window_height 40c
remember_window_size no

window_padding_width 12
hide_window_decorations yes
copy_on_select yes

# background #fbfbf5
# foreground #4c4f69

background  #181818
foreground #ebdbb2

tab_bar_edge bottom
tab_bar_style slant
enabled_layouts horizontal

map ctrl+a>c new_tab_with_cwd
map ctrl+a>p previous_tab
map ctrl+a>l next_tab
map ctrl+a>x close_tab
